<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bwxBASIC Transpiler</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            padding: 20px;
            background-color: #111;
            color: #33ff33;
            font-family: 'VT323', monospace;
            height: 100vh;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #monitor {
            width: 1320px;
            height: 1000px;
            background-color: #000;
            border: 20px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 95vw;
            max-height: 95vh;
        }

        #monitor::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        canvas {
            background-color: #000;
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: text;
        }

        #help-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            z-index: 50;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
        }

        .help-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            color: #ccc;
            padding: 10px 20px;
            font-family: sans-serif;
            font-size: 14px;
            border-bottom: 2px solid #000;
        }

        #help-search {
            background: #444;
            border: 1px solid #666;
            color: white;
            padding: 5px 10px;
            font-family: sans-serif;
            width: 200px;
        }

        .help-close {
            background: #c00;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .printer-paper {
            flex-grow: 1;
            background-color: #f4f4f0;
            background-image: repeating-linear-gradient(to bottom, #f4f4f0, #f4f4f0 40px, #e8eadd 40px, #e8eadd 80px);
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            padding: 20px 40px;
            border-left: 12px dotted #bbb;
            border-right: 12px dotted #bbb;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .help-section {
            margin-bottom: 40px;
            border-top: 2px solid #000;
            padding-top: 20px;
        }

        .help-title {
            font-size: 1.8em;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .help-entry {
            margin-bottom: 20px;
            break-inside: avoid;
        }

        .help-cmd {
            font-weight: bold;
            font-size: 1.2em;
            color: #000;
            background: rgba(0, 0, 0, 0.05);
            display: inline-block;
            padding: 0 5px;
        }

        .help-desc {
            margin: 5px 0 5px 20px;
        }

        .help-ex {
            margin-left: 20px;
            color: #004488;
            font-family: monospace;
            font-weight: bold;
        }

        .help-ex::before {
            content: "Ex: ";
            color: #666;
            font-weight: normal;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .index-btn {
            background: #fff;
            border: 2px solid #333;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        .index-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.2);
        }

        #break-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            background: #cc0000;
            color: #fff;
            border: 2px solid #ff0000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 5px 15px;
            cursor: pointer;
            display: none;
            z-index: 100;
            text-transform: uppercase;
            font-weight: bold;
        }

        #input-trap {
            position: absolute;
            opacity: 0;
            top: -1000px;
        }

        #js-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            z-index: 60;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
            background-color: #222;
        }

        #js-content {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
            border-top: 2px solid #000;
        }

        #editor-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            z-index: 70;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
            background-color: #111;
        }

        #editor-content {
            flex-grow: 1;
            background-color: #111;
            color: #33ff33;
            font-family: 'VT323', monospace;
            font-size: 24px;
            line-height: 1.2;
            overflow-y: auto;
            padding: 20px;
            white-space: pre;
            border-top: 2px solid #000;
            outline: none;
        }

        #editor-save {
            background: #008800;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'VT323', monospace;
            font-size: 20px;
        }

        #editor-cancel {
            background: #660000;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'VT323', monospace;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div id="monitor">
        <button id="break-btn">STOP (ESC)</button>
        <canvas id="main-canvas" width="640" height="480"></canvas>

        <div id="help-overlay">
            <div class="help-header">
                <span>bwxBASIC REFERENCE MANUAL</span>
                <input type="text" id="help-search" placeholder="FILTER COMMANDS..." autocomplete="off">
                <button class="help-close"
                    onclick="document.getElementById('help-overlay').style.display='none'">CLOSE</button>
            </div>
            <div class="printer-paper" id="help-content"></div>
        </div>
        <div id="js-overlay">
            <div class="help-header">
                <span>JAVASCRIPT TRANSPILER OUTPUT</span>
                <button class="help-close"
                    onclick="document.getElementById('js-overlay').style.display='none'">CLOSE</button>
            </div>
            <pre id="js-content"></pre>
        </div>
        <div id="editor-overlay">
            <div class="help-header">
                <button id="editor-cancel">CLOSE WITHOUT SAVE</button>
                <span id="editor-title">bwxBASIC INTERNAL CODE EDITOR</span>
                <button id="editor-save">SAVE & CLOSE</button>
            </div>
            <div id="editor-content"></div>
        </div>
        <input type="text" id="input-trap" autocomplete="off" autofocus>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
